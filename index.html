<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redstone Clock Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        :root[data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #222222;
            --text-muted: #555555;
            --text-oor: #aaaaaa;
            --border-color: #dddddd;
            --th-border: #000000;
            --row-hover: #f0f0f0;
            --code-bg: #f4f4f4;
            --input-bg: #ffffff;
            --input-text: #000000;
            --resizer-bg: #eeeeee;
            --resizer-hover: #0066cc;
        }

        :root[data-theme="dark"] {
            --bg-color: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #aaaaaa;
            --text-oor: #555555;
            --border-color: #333333;
            --th-border: #ffffff;
            --row-hover: #2d2d2d;
            --code-bg: #2d2d2d;
            --input-bg: #2d2d2d;
            --input-text: #ffffff;
            --resizer-bg: #2d2d2d;
            --resizer-hover: #4ba3ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .left {
            padding: 2rem;
            flex-shrink: 0;
            overflow-y: auto;
            width: 50%;
            /* Initial fallback width */
            min-width: 300px;
        }

        /* Draggable Resizer Partition */
        .resizer {
            width: 6px;
            cursor: col-resize;
            background-color: var(--resizer-bg);
            transition: background-color 0.2s;
            flex-shrink: 0;
            z-index: 10;
        }

        .resizer:hover,
        .resizer.dragging {
            background-color: var(--resizer-hover);
        }

        .right {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            min-width: 300px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1rem;
        }

        /* Theme Switch Toggle Styling */
        .theme-switch-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-switch-wrapper span {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--resizer-hover);
        }

        input:checked+.slider:before {
            transform: translateX(18px);
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        input[type=number] {
            font-size: 1rem;
            padding: 4px 6px;
            width: 160px;
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border-color);
            border-radius: 3px;
        }

        label {
            font-size: 0.85rem;
        }

        #converted {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        table {
            border-collapse: collapse;
            width: auto;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        th {
            text-align: left;
            border-bottom: 2px solid var(--th-border);
            padding: 4px 8px;
        }

        td {
            padding: 4px 8px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }

        tr.data-row {
            cursor: pointer;
        }

        tr.data-row:hover,
        tr.data-row.active {
            background: var(--row-hover);
        }

        .oor {
            color: var(--text-oor);
        }

        .exact {
            font-weight: bold;
        }

        /* Rendered Markdown Dark/Light Customizations */
        .right h1 {
            font-size: 1.4rem;
            margin: 0 0 1rem;
        }

        .right h2 {
            font-size: 1.1rem;
            margin: 1.5rem 0 0.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        .right h3 {
            font-size: 0.95rem;
            margin: 1rem 0 0.4rem;
        }

        .right p {
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        .right img {
            max-width: 100%;
            margin: 0.5rem 0;
            display: block;
        }

        .right code {
            font-family: monospace;
            font-size: 0.8rem;
            background: var(--code-bg);
            padding: 1px 4px;
            border-radius: 3px;
            color: var(--text-color);
        }

        .right pre {
            background: var(--code-bg);
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            overflow-x: auto;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .right ol,
        .right ul {
            padding-left: 1.5rem;
            font-size: 0.85rem;
            line-height: 1.8;
            margin-bottom: 0.75rem;
        }

        .right table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .right td,
        .right th {
            border: 1px solid var(--border-color);
            padding: 4px 8px;
        }

        .right .section-anchor {
            scroll-margin-top: 1rem;
        }
    </style>
</head>

<body>

    <div class="left" id="left-pane">
        <div class="header-container">
            <h1>Redstone Clock Calculator</h1>
            <div class="theme-switch-wrapper">
                <span>Dark Mode</span>
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" checked />
                    <div class="slider"></div>
                </label>
            </div>
        </div>

        <div class="row">
            <input type="number" id="inp" min="1" value="200" />
            <label>ticks</label>
        </div>
        <div class="row">
            <input type="number" id="inps" min="0.05" step="0.05" value="10" />
            <label>seconds</label>
        </div>
        <div id="converted"></div>
        <table>
            <thead>
                <tr>
                    <th>Clock</th>
                    <th>Settings</th>
                    <th>Actual time</th>
                    <th>Pulse</th>
                    <th>Accuracy</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <!-- Draggable Partition Element -->
    <div class="resizer" id="drag-handle"></div>

    <div class="right" id="readme"></div>

    <script>
        const inpT = document.getElementById('inp');
        const inpS = document.getElementById('inps');
        const conv = document.getElementById('converted');
        const tbody = document.getElementById('tbody');
        const readme = document.getElementById('readme');

        // Theme switch hook
        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        toggleSwitch.addEventListener('change', (e) => {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        });

        // Draggable partition implementation
        const leftPane = document.getElementById('left-pane');
        const dragHandle = document.getElementById('drag-handle');

        // Initialize left panel style width explicitly for math logic
        leftPane.style.width = '45%';

        dragHandle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            dragHandle.classList.add('dragging');

            window.addEventListener('mousemove', resizePanes);
            window.addEventListener('mouseup', stopResizing);
        });

        function resizePanes(e) {
            const containerWidth = document.body.getBoundingClientRect().width;
            let newLeftWidth = (e.clientX / containerWidth) * 100;

            // Enforce realistic bounds (percentages)
            if (newLeftWidth > 15 && newLeftWidth < 85) {
                leftPane.style.width = `${newLeftWidth}%`;
            }
        }

        function stopResizing() {
            dragHandle.classList.remove('dragging');
            window.removeEventListener('mousemove', resizePanes);
            window.removeEventListener('mouseup', stopResizing);
        }

        // Anchor IDs matching h2s in the README
        const ANCHORS = {
            'Repeater': 'repeater-clock4-ticks-minimum-infinitely-scalable',
            'Etho Hopper (Full)': 'etho-hopper-clock-full-07-2554-seconds',
            'Etho Hopper (Halved)': 'etho-hopper-clock-halved-035-1277-seconds',
            'Chained Hopper-Dropper': 'chained-hopper-dropper-clock-14-seconds---81728-hrs',
        };

        fetch('README.md')
            .then(r => r.text())
            .then(md => {
                readme.innerHTML = marked.parse(md);
                renderMathInElement(readme, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false }
                    ]
                });
                readme.querySelectorAll('h1,h2,h3').forEach(h => h.classList.add('section-anchor'));
            });

        function scrollTo(name) {
            const el = Array.from(readme.querySelectorAll('h2')).find(h => {
                const txt = h.textContent.toLowerCase();
                if (name === 'Etho Hopper (Full)') return txt.includes('full');
                if (name === 'Etho Hopper (Halved)') return txt.includes('halved');
                if (name === 'Repeater') return txt.includes('repeater');
                if (name === 'Chained Hopper-Dropper') return txt.includes('chained');
                return false;
            });
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        let updating = false;
        inpT.addEventListener('input', () => { if (updating) return; updating = true; inpS.value = (parseFloat(inpT.value) || 0) / 20; updating = false; render(parseInt(inpT.value) || 0); });
        inpS.addEventListener('input', () => { if (updating) return; updating = true; inpT.value = Math.round((parseFloat(inpS.value) || 0) * 20); updating = false; render(parseInt(inpT.value) || 0); });

        function acc(actual, target) {
            if (actual === target) return '100%';
            return (100 - Math.abs(actual - target) / target * 100).toFixed(2) + '%';
        }

        function fmtTime(t) {
            const s = t / 20;
            if (s < 60) return s.toFixed(2) + 's';
            const m = s / 60;
            if (m < 60) return m.toFixed(2) + 'min';
            return (m / 60).toFixed(2) + 'hr';
        }

        function render(t) {
            conv.textContent = t ? `${t} ticks = ${(t / 20).toFixed(3)}s` : '';
            if (!t || t <= 0) { tbody.innerHTML = ''; return; }

            const rows = [];

            const repMax = 800;
            if (t >= 4 && t <= repMax) {
                const half = Math.round(t / 2);
                const fours = Math.floor(half / 4);
                const rem = half % 4;
                let repStr = '';
                if (fours > 0) repStr += fours + 'x 4-tick';
                if (rem > 0) repStr += (repStr ? ' + ' : '') + '1x ' + rem + '-tick';
                const tRep = half * 2;
                rows.push({ name: 'Repeater', settings: repStr, tActual: tRep, pulse: half, exact: tRep === t, sortKey: Math.abs(tRep - t) });
            } else {
                rows.push({ name: 'Repeater', oor: t < 4 ? 'min 4 ticks' : 'max ~600 ticks', sortKey: 99 });
            }

            const efMin = 14, efMax = 16 * 320 - 12;
            if (t >= efMin && t <= efMax) {
                let i = t === 14 ? 1 : Math.max(1, Math.min(320, Math.round((t + 12) / 16)));
                const tA = i === 1 ? 14 : 16 * i - 12;
                rows.push({ name: 'Etho Hopper (Full)', settings: `${i} items`, tActual: tA, pulse: tA / 2 - 1, exact: tA === t, sortKey: Math.abs(tA - t) });
            } else {
                rows.push({ name: 'Etho Hopper (Full)', oor: `range: ${efMin}–${efMax}t`, sortKey: 99 });
            }

            const ehMin = 7, ehMax = 8 * 320 - 6;
            if (t >= ehMin && t <= ehMax) {
                let i = t === 7 ? 1 : Math.max(1, Math.min(320, Math.round((t + 6) / 8)));
                const tA = i === 1 ? 7 : 8 * i - 6;
                rows.push({ name: 'Etho Hopper (Halved)', settings: `${i} items`, tActual: tA, pulse: 2, exact: tA === t, sortKey: Math.abs(tA - t) });
            } else {
                rows.push({ name: 'Etho Hopper (Halved)', oor: `range: ${ehMin}–${ehMax}t`, sortKey: 99 });
            }

            const chainMin = 32 * 3 * 3 - 24 * 3, chainMax = 32 * 320 * 576 - 24 * 576;
            if (t >= chainMin && t <= chainMax) {
                let best = null;
                for (let i1c = 3; i1c <= 320; i1c++) {
                    const denom = 32 * i1c - 24;
                    const i2e = t / denom;
                    for (const i2c of [Math.max(3, Math.floor(i2e)), Math.min(576, Math.ceil(i2e))]) {
                        if (i2c < 3 || i2c > 576) continue;
                        const tA = 32 * i1c * i2c - 24 * i2c;
                        const err = Math.abs(tA - t);
                        if (!best || err < best.err || (err === best.err && i1c + i2c < best.i1 + best.i2))
                            best = { i1: i1c, i2: i2c, t: tA, err };
                    }
                }
                if (best)
                    rows.push({ name: 'Chained Hopper-Dropper', settings: `i₁=${best.i1}, i₂=${best.i2}`, tActual: best.t, pulse: best.t / 2 - 1, exact: best.err === 0, sortKey: best.err });
            } else {
                rows.push({ name: 'Chained Hopper-Dropper', oor: `range: ${chainMin}–${chainMax}t`, sortKey: 99 });
            }

            rows.sort((a, b) => a.sortKey - b.sortKey);

            tbody.innerHTML = rows.map(r => {
                if (r.oor) return `<tr><td>${r.name}</td><td colspan="4" class="oor">${r.oor}</td></tr>`;
                return `<tr class="data-row${r.exact ? ' exact' : ''}" data-name="${r.name}"><td>${r.name}</td><td>${r.settings}</td><td>${r.tActual}t / ${fmtTime(r.tActual)}</td><td>${r.pulse}t</td><td>${acc(r.tActual, t)}</td></tr>`;
            }).join('');

            const first = tbody.querySelector('tr.data-row');
            if (first) { first.classList.add('active'); scrollTo(first.dataset.name); }

            tbody.querySelectorAll('tr.data-row').forEach(tr => {
                tr.addEventListener('mouseenter', () => {
                    tbody.querySelectorAll('tr.data-row').forEach(r => r.classList.remove('active'));
                    tr.classList.add('active');
                    scrollTo(tr.dataset.name);
                });
            });
        }

        render(200);
    </script>
</body>

</html>
